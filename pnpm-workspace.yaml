# pnpm v11 settings — moved from package.json "pnpm" field
# https://pnpm.io/settings
#
# Security overrides are defined in package.json "overrides" (npm format).
# They are intentionally NOT duplicated here because the pnpm-lock.yaml
# was not regenerated after adding overrides (pnpm store corruption on
# Windows prevented `pnpm install --no-frozen-lockfile`).
#
# To enable pnpm overrides in the future:
#   1. Fix pnpm store (delete D:\.pnpm-store, run pnpm install)
#   2. Uncomment the overrides below
#   3. Run pnpm install --no-frozen-lockfile to regenerate lockfile
#   4. Commit the updated pnpm-lock.yaml
#   5. CI's --frozen-lockfile will then pass
#
# overrides:
#   postcss: ">=8.5.10"
#   tmp: ">=0.2.6"
#   uuid: ">=11.1.1"

allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true
